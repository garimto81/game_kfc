<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>E2E Screenshot Report — 12-edge-cases</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d2ff; }
    .checkpoint { margin: 30px 0; border: 1px solid #333; border-radius: 8px; padding: 16px; background: #16213e; }
    .checkpoint h2 { color: #e94560; margin-top: 0; }
    .checkpoint .desc { color: #aaa; font-size: 0.9em; margin-bottom: 12px; }
    .screenshots { display: flex; gap: 12px; overflow-x: auto; }
    .screenshot { flex: 0 0 auto; text-align: center; }
    .screenshot img { max-width: 480px; border: 2px solid #333; border-radius: 4px; }
    .screenshot .name { font-weight: bold; color: #00d2ff; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>E2E Screenshot Report: 12-edge-cases</h1>
  <p>Total checkpoints: 3 | Total screenshots: 6</p>
  
  <div class="checkpoint">
    <h2>12-VIEW-SPLIT</h2>
    <div class="desc">Split View (기본)</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="12-VIEW-SPLIT-Viewer.png" alt="12-VIEW-SPLIT - Viewer" />
        <div class="name">Viewer</div>
      </div>
      <div class="screenshot">
        <img src="12-VIEW-SPLIT-Partner.png" alt="12-VIEW-SPLIT - Partner" />
        <div class="name">Partner</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>12-VIEW-GRID</h2>
    <div class="desc">Grid View (스크린샷)</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="12-VIEW-GRID-Viewer.png" alt="12-VIEW-GRID - Viewer" />
        <div class="name">Viewer</div>
      </div>
      <div class="screenshot">
        <img src="12-VIEW-GRID-Partner.png" alt="12-VIEW-GRID - Partner" />
        <div class="name">Partner</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>12-VIEW-TOGGLE</h2>
    <div class="desc">View 토글 완료</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="12-VIEW-TOGGLE-Viewer.png" alt="12-VIEW-TOGGLE - Viewer" />
        <div class="name">Viewer</div>
      </div>
      <div class="screenshot">
        <img src="12-VIEW-TOGGLE-Partner.png" alt="12-VIEW-TOGGLE - Partner" />
        <div class="name">Partner</div>
      </div>
    </div>
  </div>
</body>
</html>
