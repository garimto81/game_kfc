<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>E2E Screenshot Report — 10-timer-timeout</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d2ff; }
    .checkpoint { margin: 30px 0; border: 1px solid #333; border-radius: 8px; padding: 16px; background: #16213e; }
    .checkpoint h2 { color: #e94560; margin-top: 0; }
    .checkpoint .desc { color: #aaa; font-size: 0.9em; margin-bottom: 12px; }
    .screenshots { display: flex; gap: 12px; overflow-x: auto; }
    .screenshot { flex: 0 0 auto; text-align: center; }
    .screenshot img { max-width: 480px; border: 2px solid #333; border-radius: 4px; }
    .screenshot .name { font-weight: bold; color: #00d2ff; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>E2E Screenshot Report: 10-timer-timeout</h1>
  <p>Total checkpoints: 5 | Total screenshots: 10</p>
  
  <div class="checkpoint">
    <h2>10-TIMER-BAR</h2>
    <div class="desc">타이머 바 (시작)</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="10-TIMER-BAR-Active.png" alt="10-TIMER-BAR - Active" />
        <div class="name">Active</div>
      </div>
      <div class="screenshot">
        <img src="10-TIMER-BAR-AFK.png" alt="10-TIMER-BAR - AFK" />
        <div class="name">AFK</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>10-TIMER-5S</h2>
    <div class="desc">타이머 5초 남음</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="10-TIMER-5S-Active.png" alt="10-TIMER-5S - Active" />
        <div class="name">Active</div>
      </div>
      <div class="screenshot">
        <img src="10-TIMER-5S-AFK.png" alt="10-TIMER-5S - AFK" />
        <div class="name">AFK</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>10-TIMER-EXPIRE</h2>
    <div class="desc">타이머 만료</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="10-TIMER-EXPIRE-Active.png" alt="10-TIMER-EXPIRE - Active" />
        <div class="name">Active</div>
      </div>
      <div class="screenshot">
        <img src="10-TIMER-EXPIRE-AFK.png" alt="10-TIMER-EXPIRE - AFK" />
        <div class="name">AFK</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>10-TIMER-ADVANCE</h2>
    <div class="desc">다음 턴 진행</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="10-TIMER-ADVANCE-Active.png" alt="10-TIMER-ADVANCE - Active" />
        <div class="name">Active</div>
      </div>
      <div class="screenshot">
        <img src="10-TIMER-ADVANCE-AFK.png" alt="10-TIMER-ADVANCE - AFK" />
        <div class="name">AFK</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>10-TIMER-SCORE</h2>
    <div class="desc">타임아웃 후 스코어</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="10-TIMER-SCORE-Active.png" alt="10-TIMER-SCORE - Active" />
        <div class="name">Active</div>
      </div>
      <div class="screenshot">
        <img src="10-TIMER-SCORE-AFK.png" alt="10-TIMER-SCORE - AFK" />
        <div class="name">AFK</div>
      </div>
    </div>
  </div>
</body>
</html>
