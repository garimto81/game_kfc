<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>E2E Screenshot Report — 12-edge-cases</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d2ff; }
    .checkpoint { margin: 30px 0; border: 1px solid #333; border-radius: 8px; padding: 16px; background: #16213e; }
    .checkpoint h2 { color: #e94560; margin-top: 0; }
    .checkpoint .desc { color: #aaa; font-size: 0.9em; margin-bottom: 12px; }
    .screenshots { display: flex; gap: 12px; overflow-x: auto; }
    .screenshot { flex: 0 0 auto; text-align: center; }
    .screenshot img { max-width: 480px; border: 2px solid #333; border-radius: 4px; }
    .screenshot .name { font-weight: bold; color: #00d2ff; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>E2E Screenshot Report: 12-edge-cases</h1>
  <p>Total checkpoints: 2 | Total screenshots: 3</p>
  
  <div class="checkpoint">
    <h2>12-HOST-LEAVE</h2>
    <div class="desc">호스트 퇴장 후</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="12-HOST-LEAVE-P2.png" alt="12-HOST-LEAVE - P2" />
        <div class="name">P2</div>
      </div>
      <div class="screenshot">
        <img src="12-HOST-LEAVE-P3.png" alt="12-HOST-LEAVE - P3" />
        <div class="name">P3</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>12-LAST-PLAYER</h2>
    <div class="desc">마지막 플레이어</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="12-LAST-PLAYER-P3.png" alt="12-LAST-PLAYER - P3" />
        <div class="name">P3</div>
      </div>
    </div>
  </div>
</body>
</html>
