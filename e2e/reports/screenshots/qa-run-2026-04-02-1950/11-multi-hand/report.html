<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>E2E Screenshot Report — 11-multi-hand</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #00d2ff; }
    .checkpoint { margin: 30px 0; border: 1px solid #333; border-radius: 8px; padding: 16px; background: #16213e; }
    .checkpoint h2 { color: #e94560; margin-top: 0; }
    .checkpoint .desc { color: #aaa; font-size: 0.9em; margin-bottom: 12px; }
    .screenshots { display: flex; gap: 12px; overflow-x: auto; }
    .screenshot { flex: 0 0 auto; text-align: center; }
    .screenshot img { max-width: 480px; border: 2px solid #333; border-radius: 4px; }
    .screenshot .name { font-weight: bold; color: #00d2ff; margin-top: 4px; }
  </style>
</head>
<body>
  <h1>E2E Screenshot Report: 11-multi-hand</h1>
  <p>Total checkpoints: 3 | Total screenshots: 3</p>
  
  <div class="checkpoint">
    <h2>hand1-score</h2>
    <div class="desc">Hand 1 점수</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="hand1-score-Player1.png" alt="hand1-score - Player1" />
        <div class="name">Player1</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>hand2-score</h2>
    <div class="desc">Hand 2 점수</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="hand2-score-Player1.png" alt="hand2-score - Player1" />
        <div class="name">Player1</div>
      </div>
    </div>
  </div>
  <div class="checkpoint">
    <h2>hand3-score</h2>
    <div class="desc">Hand 3 점수</div>
    <div class="screenshots">
      
      <div class="screenshot">
        <img src="hand3-score-Player1.png" alt="hand3-score - Player1" />
        <div class="name">Player1</div>
      </div>
    </div>
  </div>
</body>
</html>
