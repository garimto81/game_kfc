services:
  game-server:
    build: ./server
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/rooms"]
      interval: 30s
      timeout: 3s
      retries: 3

  web:
    build: .
    restart: unless-stopped
    ports:
      - "9090:80"
    depends_on:
      game-server:
        condition: service_healthy
