services:
  game-server:
    build: ./server
    restart: unless-stopped
    expose:
      - "3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - sqlite-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/rooms"]
      interval: 30s
      timeout: 3s
      retries: 3
    networks:
      - internal

  web:
    build: .
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      game-server:
        condition: service_healthy
    networks:
      - internal
      - default

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - default

volumes:
  certbot-conf:
  certbot-www:
  sqlite-data:

networks:
  internal:
    driver: bridge
