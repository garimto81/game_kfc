name: game_kfc
description: "Game KFC - Open Face Chinese Poker Strategy Game"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Networking
  web_socket_channel: ^3.0.3
  http: ^1.3.0

  # Animation
  rive: ^0.14.3
  flutter_animate: ^4.5.2

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Auth
  google_sign_in: ^6.2.0
  flutter_secure_storage: ^9.2.0

  # Utils
  uuid: ^4.5.3
  collection: ^1.19.1

  # Audio
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8
  json_serializable: ^6.9.5
  riverpod_generator: ^2.6.4
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/rive/
    - assets/cards/
    - assets/sounds/
    - assets/emoticons/
    - assets/themes/
    - assets/flags/
    - assets/spine/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1a1a2e"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#1a1a2e"
  image: "assets/splash/splash_logo.png"
  android_12:
    color: "#1a1a2e"
    image: "assets/splash/splash_logo.png"
  ios: true
  web: true
