name: CI

on:
  push:
    branches: [main, master, feat/**]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  FLUTTER_VERSION: '3.24.x'

jobs:
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install deps
        working-directory: server
        run: npm ci
      - name: Unit tests (scorer/evaluator/royalty/deck)
        working-directory: server
        run: npm test
      - name: Auth test
        working-directory: server
        run: npm run test:auth
        continue-on-error: true
      - name: WS protocol test
        working-directory: server
        run: timeout 120 npm run test:ws
        continue-on-error: true

  password-gate-e2e:
    name: Password Gate E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install deps
        working-directory: server
        run: npm ci
      - name: Start server (background)
        working-directory: server
        env:
          JWT_SECRET: ci-test-secret-32bytes-0123456789abcdef
          NODE_ENV: development
          PORT: 3000
        run: |
          node index.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/rooms && break
            sleep 1
          done
      - name: Run password-gate E2E
        working-directory: server
        env:
          TEST_HOST: http://localhost:3000
        run: npm run test:password-gate
      - name: Stop server
        if: always()
        run: kill $SERVER_PID || true

  flutter-analyze:
    name: Flutter Analyze + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Get deps
        run: flutter pub get
      - name: Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true
      - name: Unit tests
        run: flutter test
        continue-on-error: true

  docker-build:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: [server-test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          load: true
          tags: game-kfc-server:ci
      - name: Smoke test server image
        run: |
          docker run -d --name test-server \
            -e JWT_SECRET=ci-smoke-test-32bytes-0123456789abcdef \
            -e NODE_ENV=development \
            -p 3000:3000 \
            game-kfc-server:ci
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/api/rooms && break
            sleep 1
          done
          curl -sf http://localhost:3000/api/rooms
          docker logs test-server
          docker stop test-server
