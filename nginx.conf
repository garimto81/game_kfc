resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # MED-6: 보안 헤더
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript application/wasm;
    gzip_min_length 256;

    # Let's Encrypt ACME challenge (프로덕션용)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Auth 리버스 프록시 → game-server
    location /auth/ {
        set $backend http://game-server:3000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 리버스 프록시 → game-server
    location /api/ {
        set $backend http://game-server:3000;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket 리버스 프록시 → game-server
    location /ws/ {
        set $backend_ws http://game-server:3000;
        proxy_pass $backend_ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Flutter Web SPA 라우팅
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 에셋 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|wasm|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
